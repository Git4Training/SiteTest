<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MoreFur — Shampoo for tiny predators</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

<!-- React + Babel loaded in HEAD so they run before any body-injected scripts -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #ECE6DA;
    --bg-alt: #DDD3BF;
    --ink: #1F1B14;
    --ink-soft: #3A3326;
    --moss: #4A5A3A;
    --moss-deep: #2E3826;
    --clay: #A0512E;
    --clay-deep: #6B3418;
    --cream: #F4EFE3;
    --line: rgba(31, 27, 20, 0.18);

    --serif: 'Instrument Serif', 'PT Serif', Georgia, serif;
    --serif-body: 'Newsreader', 'PT Serif', Georgia, serif;
    --sans: 'DM Sans', -apple-system, system-ui, sans-serif;
    --mono: 'Space Grotesk', 'IBM Plex Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--ink); font-family: var(--sans); }
  body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  ::selection { background: var(--moss); color: var(--cream); }
  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--ink-soft); border-radius: 0; }

  .serif { font-family: var(--serif); font-weight: 400; letter-spacing: -0.01em; }
  .serif-italic { font-family: var(--serif); font-style: italic; }
  .mono { font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; font-size: 11px; font-weight: 500; }
  .container { max-width: 1440px; margin: 0 auto; padding: 0 32px; }

  @media (max-width: 720px) {
    .container { padding: 0 20px; }
  }

  #app { min-height: 100vh; }

  .boot {
    position: fixed; inset: 0; background: var(--bg); display: grid; place-items: center;
    font-family: var(--serif); font-size: 24px; color: var(--ink); z-index: 100;
  }
</style>
</head>
<body>

<div id="app">
  <div class="boot serif-italic">MoreFur…</div>
</div>

<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Components -->
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/sections.jsx"></script>
<script type="text/babel" src="src/sections-2.jsx"></script>
<script type="text/babel" src="src/cart.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

</body>
</html>
